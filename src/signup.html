<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Misión Desperdicio Cero</title>
    <link rel="icon" type="image/png" href="icon/market_main.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: #0a1a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(74,222,128,0.12) 0%, transparent 70%);
            top: -80px; left: -100px;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(251,146,60,0.10) 0%, transparent 70%);
            bottom: -60px; right: -60px;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(74,222,128,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,222,128,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .register-card {
            position: relative;
            z-index: 2;
            background: rgba(15, 30, 18, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(74,222,128,0.12);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeUp 0.7s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4ade80;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.03em;
            margin-bottom: 28px;
            opacity: 0.8;
            transition: opacity 0.2s;
            float: left;
        }
        .back-link:hover { opacity: 1; }

        .logo-wrap {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            clear: both;
        }

        h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            font-weight: 400;
            color: #f0fdf4;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .card-subtitle {
            font-size: 14px;
            color: #6b7280;
            font-weight: 300;
            margin-bottom: 28px;
        }

        /* Selector de roles */
        .role-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }

        .role-item {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.03);
        }

        .role-item:hover {
            background: rgba(255,255,255,0.06);
        }

        .role-item .role-icon { font-size: 22px; display: block; margin-bottom: 6px; }
        .role-item span { display: block; font-weight: 500; font-size: 13px; color: #e5e7eb; margin-top: 2px; }
        .role-item small { font-size: 10px; color: #6b7280; letter-spacing: 0.04em; text-transform: uppercase; }

        /* Estados activos por rol */
        .role-item.active[data-role="donador"] {
            border: 1.5px solid rgba(251,146,60,0.6);
            background: rgba(251,146,60,0.08);
        }
        .role-item.active[data-role="donador"] span { color: #fb923c; }

        .role-item.active[data-role="receptor"] {
            border: 1.5px solid rgba(74,222,128,0.6);
            background: rgba(74,222,128,0.08);
        }
        .role-item.active[data-role="receptor"] span { color: #4ade80; }

        .role-item.active[data-role="jugador"] {
            border: 1.5px solid rgba(250,204,21,0.6);
            background: rgba(250,204,21,0.08);
        }
        .role-item.active[data-role="jugador"] span { color: #facc15; }

        /* Campos del formulario */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #4ade80;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(74,222,128,0.15);
            border-radius: 12px;
            padding: 0 14px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(74,222,128,0.45);
        }

        .input-icon { font-size: 15px; opacity: 0.5; flex-shrink: 0; }

        .input-wrapper input,
        .input-wrapper select {
            background: transparent;
            border: none;
            outline: none;
            padding: 13px 0;
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #e5e7eb;
        }

        .input-wrapper input::placeholder { color: rgba(255,255,255,0.2); }

        .input-wrapper select option { background: #0f1e12; color: #e5e7eb; }

        /* Botón principal */
        .btn-main {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: none;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-donador { background: #fb923c; }
        .btn-donador:hover { background: #f97316; box-shadow: 0 8px 24px rgba(251,146,60,0.35); transform: translateY(-1px); }

        .btn-receptor { background: #4ade80; color: #0a1a0f; }
        .btn-receptor:hover { background: #22c55e; box-shadow: 0 8px 24px rgba(74,222,128,0.3); transform: translateY(-1px); }

        .btn-jugador { background: #facc15; color: #0a1a0f; }
        .btn-jugador:hover { background: #eab308; box-shadow: 0 8px 24px rgba(250,204,21,0.3); transform: translateY(-1px); }

        .footer-text {
            margin-top: 24px;
            font-size: 13px;
            color: #6b7280;
        }
        .footer-text a {
            color: #fb923c;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-text a:hover { color: #f97316; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="bg-grid"></div>

    <div class="register-card">
        <a href="../index.html" class="back-link">← Volver al inicio</a>

        <div class="logo-wrap">
            <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="28" cy="28" r="28" fill="rgba(74,222,128,0.10)"/>
                <path d="M28 10C28 10 20 18 20 26C20 30.418 23.582 34 28 34C32.418 34 36 30.418 36 26C36 18 28 10 28 10Z" fill="#4ade80"/>
                <path d="M22 30C22 30 16 33 16 39C16 43 19.5 46 24 46C28 46 30 43 28 39" stroke="#fb923c" stroke-width="2" stroke-linecap="round" fill="none"/>
                <circle cx="28" cy="34" r="3" fill="#f0fdf4"/>
            </svg>
        </div>

        <h2>Únete a la misión</h2>
        <p class="card-subtitle">Selecciona tu rol y crea tu cuenta</p>

        <div class="role-grid">
            <div class="role-item active" data-role="donador">
                <i class="role-icon">🏢</i>
                <span>Donador</span>
                <small>Empresa</small>
            </div>
            <div class="role-item" data-role="receptor">
                <i class="role-icon">❤️</i>
                <span>Receptor</span>
                <small>Organización</small>
            </div>
            <div class="role-item" data-role="jugador">
                <i class="role-icon">🎮</i>
                <span>Jugador</span>
                <small>Participante</small>
            </div>
        </div>

        <form id="signupForm" action="signup.php" method="POST">
            <input type="hidden" name="user_role" id="user_role" value="donador">
            <div id="fields-container"></div>
            <button type="submit" id="mainBtn" class="btn-main btn-donador">Crear cuenta</button>
        </form>

        <div class="footer-text">
            ¿Ya tienes cuenta? <a href="signin.html">Inicia sesión</a>
        </div>
    </div>

<script>
    const roles = document.querySelectorAll('.role-item');
    const container = document.getElementById('fields-container');
    const roleInput = document.getElementById('user_role');
    const btn = document.getElementById('mainBtn');

    const templates = {
        donador: `
            <div class="form-group"><label>Nombre de la empresa</label><div class="input-wrapper"><span class="input-icon">🏢</span><input type="text" name="empresa" placeholder="Ej: Supermercado Pasto" required></div></div>
            <div class="form-group"><label>Correo electrónico</label><div class="input-wrapper"><span class="input-icon">✉️</span><input type="email" name="email" placeholder="empresa@correo.com" required></div></div>
            <div class="form-group"><label>Nombre del responsable</label><div class="input-wrapper"><span class="input-icon">👤</span><input type="text" name="fname" placeholder="Nombre completo" required></div></div>
            <div class="form-group"><label>Teléfono</label><div class="input-wrapper"><span class="input-icon">📞</span><input type="text" name="mnumber" placeholder="300 000 0000" required></div></div>
        `,
        receptor: `
            <div class="form-group"><label>Nombre de la organización</label><div class="input-wrapper"><span class="input-icon">❤️</span><input type="text" name="org" placeholder="Ej: Fundación Sol" required></div></div>
            <div class="form-group"><label>Correo electrónico</label><div class="input-wrapper"><span class="input-icon">✉️</span><input type="email" name="email" placeholder="organizacion@correo.com" required></div></div>
            <div class="form-group"><label>Tipo de institución</label><div class="input-wrapper"><select name="tipo"><option value="comedor">Comedor Social</option><option value="ong">ONG / Fundación</option></select></div></div>
            <div class="form-group"><label>Persona de contacto</label><div class="input-wrapper"><span class="input-icon">👤</span><input type="text" name="fname" placeholder="Nombre completo" required></div></div>
            <div class="form-group"><label>Teléfono</label><div class="input-wrapper"><span class="input-icon">📞</span><input type="text" name="mnumber" placeholder="300 000 0000" required></div></div>
        `,
        jugador: `
            <div class="form-group"><label>Nombre de usuario</label><div class="input-wrapper"><span class="input-icon">👤</span><input type="text" name="username" placeholder="Tu apodo en el juego" required></div></div>
            <div class="form-group"><label>Correo electrónico</label><div class="input-wrapper"><span class="input-icon">✉️</span><input type="email" name="email" placeholder="tu@correo.com" required></div></div>
        `
    };

    function setFields(role) {
        container.innerHTML = templates[role] + `
            <div class="form-group"><label>Contraseña</label><div class="input-wrapper"><span class="input-icon">🔒</span><input type="password" name="passwd" placeholder="••••••••" required></div></div>
        `;
        roleInput.value = role;
        btn.className = `btn-main btn-${role}`;
    }

    roles.forEach(item => {
        item.addEventListener('click', () => {
            roles.forEach(r => r.classList.remove('active'));
            item.classList.add('active');
            setFields(item.dataset.role);
        });
    });

    setFields('donador');
</script>

</body>
</html>
