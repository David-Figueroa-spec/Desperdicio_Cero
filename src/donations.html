<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donaciones Disponibles | ReAprovecha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.05); 
            border-top: 6px solid #2ecc71; 
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .card:hover { transform: translateY(-5px); }

        .badge { 
            background: #e8f5e9; 
            color: #27ae60; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase;
            align-self: flex-start;
            margin-bottom: 10px;
        }

        .card h3 { margin: 10px 0; color: #2c3e50; font-size: 1.2rem; }
        .info { font-size: 0.9rem; margin-bottom: 15px; color: #666; }
        .info strong { color: #333; }

        .btn { 
            background: #2ecc71; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s;
        }
        
        .btn:hover { background: #27ae60; }

        .empty-state { 
            text-align: center; 
            grid-column: 1 / -1; 
            padding: 50px; 
            background: #fff; 
            border-radius: 12px; 
        }
    </style>
</head>
<body>

    <h1>🍎 Alimentos Disponibles</h1>

    <div class="grid">
        <?php if (!empty($donaciones)): ?>
            <?php foreach ($donaciones as $item): ?>
                <div class="card">
                    <div>
                        <span class="badge"><?php echo htmlspecialchars($item['categoria'] ?? 'General'); ?></span>
                        <h3><?php echo htmlspecialchars($item['producto'] ?? $item['nombre_alimento']); ?></h3>
                        
                        <div class="info">
                            <p><strong>Cantidad:</strong> <?php echo htmlspecialchars($item['cantidad']); ?></p>
                            <p><strong>Vence:</strong> <?php echo htmlspecialchars($item['fecha_vencimiento']); ?></p>
                        </div>
                    </div>
                    
                    <form action="process_request.php" method="POST" onsubmit="return confirm('¿Deseas solicitar este alimento?')">
                        <input type="hidden" name="id_donacion" value="<?php echo (int)$item['id']; ?>">
                        <button type="submit" class="btn">Solicitar este alimento</button>
                    </form>
                </div>
            <?php endforeach; ?>
        <?php else: ?>
            <div class="empty-state">
                <p>No hay alimentos disponibles para recibir en este momento. ¡Vuelve pronto!</p>
            </div>
        <?php endif; ?>
    </div>

</body>
</html>
